<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crypto Price Guess</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d1117;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 500px;
  padding: 12px 16px;
}
.header .pair { font-size: 18px; font-weight: 700; color: #58a6ff; }
.stats {
  display: flex;
  gap: 16px;
  font-size: 14px;
}
.stats span { color: #8b949e; }
.stats .val { color: #e6edf3; font-weight: 600; }
#chart-wrap {
  width: 100%;
  max-width: 500px;
  flex: 1;
  position: relative;
  padding: 0 8px;
}
canvas {
  width: 100%;
  height: 100%;
  display: block;
}
.controls {
  width: 100%;
  max-width: 500px;
  padding: 12px 16px 24px;
  display: flex;
  gap: 12px;
}
.btn {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.4; cursor: default; transform: none; }
.btn-up { background: #238636; color: #fff; }
.btn-down { background: #da3633; color: #fff; }
.result-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 48px;
  font-weight: 900;
  text-shadow: 0 2px 20px rgba(0,0,0,0.6);
  transition: transform 0.3s ease;
  z-index: 10;
  pointer-events: none;
}
.result-overlay.show { transform: translate(-50%, -50%) scale(1); }
.result-overlay.correct { color: #3fb950; }
.result-overlay.wrong { color: #f85149; }
.streak-bar {
  width: 100%;
  max-width: 500px;
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #8b949e;
  margin-bottom: 4px;
}
.streak-dots {
  display: flex;
  gap: 4px;
}
.streak-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #30363d;
  transition: background 0.3s;
}
.streak-dot.hit { background: #3fb950; }
.streak-dot.miss { background: #f85149; }
/* Education panel */
.edu-panel {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  background: #161b22;
  border-top: 2px solid #30363d;
  border-radius: 16px 16px 0 0;
  padding: 16px 20px 32px;
  z-index: 30;
  transform: translateY(110%);
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.edu-panel.show { transform: translateY(0); }
.edu-pattern-name {
  font-size: 15px;
  font-weight: 700;
  color: #f85149;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.edu-pattern-name .tag {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 600;
}
.edu-pattern-name .tag-bull { background: #1a4731; color: #3fb950; }
.edu-pattern-name .tag-bear { background: #3d1a1a; color: #f85149; }
.edu-body {
  font-size: 13px;
  color: #8b949e;
  line-height: 1.55;
  margin-bottom: 14px;
}
.edu-body strong { color: #e6edf3; }
.edu-got-it {
  width: 100%;
  padding: 12px;
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 10px;
  color: #e6edf3;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.edu-got-it:active { background: #30363d; }

/* Game Over */
.gameover {
  position: absolute;
  inset: 0;
  background: rgba(13,17,23,0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
.gameover.show { opacity: 1; pointer-events: auto; }
.gameover h2 { font-size: 28px; margin-bottom: 8px; }
.gameover .final-score { font-size: 56px; font-weight: 900; color: #58a6ff; }
.gameover .detail { color: #8b949e; margin-top: 8px; font-size: 15px; }
.gameover .restart-btn {
  margin-top: 24px;
  padding: 14px 48px;
  background: #238636;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
}
.gameover .claim-btn {
  display: none;
  margin-top: 12px;
  padding: 12px 32px;
  background: #1d63ed;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="header">
  <div class="pair">BTC / USDT</div>
  <div class="stats">
    <div><span>Score </span><span class="val" id="score">0</span></div>
    <div><span>Round </span><span class="val" id="round">1</span><span class="val">/10</span></div>
  </div>
</div>

<div class="streak-bar">
  <span>Streak</span>
  <div class="streak-dots" id="streakDots"></div>
  <span id="streakMulti"></span>
</div>

<div id="chart-wrap">
  <canvas id="chart"></canvas>
  <div class="result-overlay" id="resultText"></div>
</div>

<div class="controls">
  <button class="btn btn-up" id="btnUp" onclick="guess('up')">&#9650; Long</button>
  <button class="btn btn-down" id="btnDown" onclick="guess('down')">&#9660; Short</button>
</div>

<div class="edu-panel" id="eduPanel">
  <div class="edu-pattern-name" id="eduTitle"></div>
  <div class="edu-body" id="eduBody"></div>
  <button class="edu-got-it" onclick="dismissEdu()">Got it — Next Round →</button>
</div>

<div class="gameover" id="gameover">
  <h2>Game Over</h2>
  <div class="final-score" id="finalScore">0</div>
  <div class="detail" id="finalDetail"></div>
  <button class="restart-btn" onclick="startGame()">Play Again</button>
  <button id="claimBtn" class="claim-btn" onclick="claimPoints()">🎁 Claim Points in Bot</button>
</div>

<script>
// ── Config ──
const TOTAL_ROUNDS = 10;
const CANDLES_SHOW = 20;    // visible candles before guess
const CANDLES_REVEAL = 5;   // candles revealed after guess
const BASE_POINTS = 10;

// ── URL Params (token & bot passed by Telegram bot) ──
const _params = new URLSearchParams(window.location.search);
const GAME_TOKEN = _params.get('token') || '';
const BOT_NAME   = _params.get('bot')   || '';

// ── State ──
let allCandles = [];
let revealIndex = 0;
let score = 0;
let round = 0;
let streak = 0;
let maxStreak = 0;
let correctCount = 0;
let roundHistory = [];
let animating = false;

// ── Canvas ──
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const wrap = document.getElementById('chart-wrap');
  const dpr = window.devicePixelRatio || 1;
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
window.addEventListener('resize', resize);

// ── Generate candles ──
function genCandles(count) {
  const candles = [];
  let price = 60000 + Math.random() * 10000;
  for (let i = 0; i < count; i++) {
    const vol = price * (0.005 + Math.random() * 0.02);
    const open = price;
    const close = open + (Math.random() - 0.48) * vol;
    const high = Math.max(open, close) + Math.random() * vol * 0.5;
    const low = Math.min(open, close) - Math.random() * vol * 0.5;
    candles.push({ o: open, h: high, l: low, c: close });
    price = close;
  }
  return candles;
}

// ── Draw ──
function draw() {
  if (!W) return;
  ctx.clearRect(0, 0, W, H);

  const visible = allCandles.slice(0, revealIndex);
  if (visible.length === 0) return;

  const pad = { top: 20, bottom: 20, left: 10, right: 10 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;

  let hi = -Infinity, lo = Infinity;
  visible.forEach(c => { hi = Math.max(hi, c.h); lo = Math.min(lo, c.l); });
  const range = hi - lo || 1;
  hi += range * 0.05;
  lo -= range * 0.05;
  const totalRange = hi - lo;

  const candleW = chartW / (visible.length + 1);
  const bodyW = Math.max(candleW * 0.6, 2);

  const toY = v => pad.top + (1 - (v - lo) / totalRange) * chartH;

  // grid lines
  ctx.strokeStyle = '#161b22';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const y = pad.top + (chartH / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
  }

  // divider line between shown and revealed
  if (revealIndex > CANDLES_SHOW && round <= TOTAL_ROUNDS) {
    const dx = pad.left + CANDLES_SHOW * candleW + candleW * 0.5;
    ctx.strokeStyle = '#30363d';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(dx, pad.top);
    ctx.lineTo(dx, H - pad.bottom);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#484f58';
    ctx.font = '11px sans-serif';
    ctx.fillText('Your guess', dx + 4, pad.top + 14);
  }

  // candles
  visible.forEach((c, i) => {
    const x = pad.left + i * candleW + candleW * 0.5;
    const bull = c.c >= c.o;
    const isRevealed = i >= CANDLES_SHOW;
    const color = bull ? '#3fb950' : '#f85149';
    const alpha = isRevealed ? 0.85 : 1;

    ctx.globalAlpha = alpha;

    // wick
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, toY(c.h));
    ctx.lineTo(x, toY(c.l));
    ctx.stroke();

    // body
    const yTop = toY(Math.max(c.o, c.c));
    const yBot = toY(Math.min(c.o, c.c));
    const bodyH = Math.max(yBot - yTop, 1);
    ctx.fillStyle = color;
    ctx.fillRect(x - bodyW / 2, yTop, bodyW, bodyH);

    ctx.globalAlpha = 1;
  });

  // current price label
  const last = visible[visible.length - 1];
  const priceY = toY(last.c);
  const priceColor = last.c >= last.o ? '#3fb950' : '#f85149';
  ctx.fillStyle = priceColor;
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(last.c.toFixed(0), W - pad.right - 2, priceY - 6);
  ctx.textAlign = 'left';
}

// ── Pattern Detection ──
function detectPattern(candles) {
  // Use the last 6 candles before the guess point
  const slice = candles.slice(Math.max(0, CANDLES_SHOW - 6), CANDLES_SHOW);
  const last = slice[slice.length - 1];
  const prev = slice[slice.length - 2];
  const last3 = slice.slice(-3);
  const last5 = slice.slice(-5);

  const bodySize = c => Math.abs(c.c - c.o);
  const range = c => c.h - c.l;
  const isBull = c => c.c > c.o;
  const isBear = c => c.c < c.o;
  const upperWick = c => c.h - Math.max(c.o, c.c);
  const lowerWick = c => Math.min(c.o, c.c) - c.l;

  // Doji: body < 15% of total range
  if (bodySize(last) < range(last) * 0.15 && range(last) > 0) {
    const prevBull = last5.slice(0, 4).filter(isBull).length >= 3;
    const prevBear = last5.slice(0, 4).filter(isBear).length >= 3;
    if (prevBull) return {
      name: 'Doji (Top)', signal: 'bear',
      emoji: '⚠️',
      explanation: 'A <strong>Doji</strong> appeared at the top of an uptrend — open and close are nearly equal, meaning buyers and sellers are in balance and buying momentum is exhausted. This is a classic <strong>trend reversal warning</strong>: the market often turns down after this signal.'
    };
    if (prevBear) return {
      name: 'Doji (Bottom)', signal: 'bull',
      emoji: '🕯️',
      explanation: 'A <strong>Doji</strong> appeared at the bottom of a downtrend — neither side dominates and sellers can no longer push price lower. This signals <strong>weakening sell pressure</strong> and is often seen at local bottoms, suggesting a potential bounce.'
    };
  }

  // Hammer: lower wick >= 2x body, small upper wick, in downtrend
  if (lowerWick(last) >= bodySize(last) * 2 && upperWick(last) < bodySize(last) * 0.5) {
    const prevBear = last5.slice(0, 4).filter(isBear).length >= 3;
    if (prevBear) return {
      name: 'Hammer', signal: 'bull',
      emoji: '🔨',
      explanation: 'A <strong>Hammer</strong> has a small body and a long lower wick. Price dropped sharply during the candle but buyers stepped in and pushed it back up. This shows <strong>strong buying interest at low prices</strong> — bears tried to push lower but failed. A classic bullish reversal signal in a downtrend.'
    };
  }

  // Shooting star: upper wick >= 2x body, small lower wick, in uptrend
  if (upperWick(last) >= bodySize(last) * 2 && lowerWick(last) < bodySize(last) * 0.5) {
    const prevBull = last5.slice(0, 4).filter(isBull).length >= 3;
    if (prevBull) return {
      name: 'Shooting Star', signal: 'bear',
      emoji: '🌠',
      explanation: 'A <strong>Shooting Star</strong> has a small body and a long upper wick. Price surged during the candle but sellers pushed it back down hard. This signals <strong>heavy selling pressure at the top</strong> — bulls ran out of steam. A classic bearish reversal signal in an uptrend.'
    };
  }

  // Bullish engulfing
  if (prev && isBear(prev) && isBull(last) &&
      last.c > prev.o && last.o < prev.c) {
    return {
      name: 'Bullish Engulfing', signal: 'bull',
      emoji: '📈',
      explanation: '<strong>Bullish Engulfing</strong>: the green candle\'s body completely covers the previous red candle\'s body. Buyers reversed the entire prior session\'s loss in a single candle, showing a <strong>powerful shift in momentum to the upside</strong>.'
    };
  }

  // Bearish engulfing
  if (prev && isBull(prev) && isBear(last) &&
      last.o > prev.c && last.c < prev.o) {
    return {
      name: 'Bearish Engulfing', signal: 'bear',
      emoji: '📉',
      explanation: '<strong>Bearish Engulfing</strong>: the red candle\'s body completely swallows the previous green candle\'s body. Sellers wiped out the entire prior session\'s gain in one candle, signaling a <strong>decisive shift in control to the downside</strong>.'
    };
  }

  // Three white soldiers
  if (last3.every(isBull) && last3[1].c > last3[0].c && last3[2].c > last3[1].c) {
    return {
      name: 'Three White Soldiers', signal: 'bull',
      emoji: '🪖',
      explanation: '<strong>Three White Soldiers</strong>: three consecutive green candles, each closing higher than the last with little upper wick. This is a strong signal of <strong>sustained buying momentum</strong> — bulls are firmly in control and the uptrend is likely to continue.'
    };
  }

  // Three black crows
  if (last3.every(isBear) && last3[1].c < last3[0].c && last3[2].c < last3[1].c) {
    return {
      name: 'Three Black Crows', signal: 'bear',
      emoji: '🪶',
      explanation: '<strong>Three Black Crows</strong>: three consecutive red candles, each closing lower than the last. This is a strong signal of <strong>sustained selling pressure</strong> — bears are in full control and the downtrend is likely to continue.'
    };
  }

  // Fallback: trend
  const bullCount = last5.filter(isBull).length;
  if (bullCount >= 4) return {
    name: 'Strong Uptrend', signal: 'bull',
    emoji: '📊',
    explanation: '4 or more of the last 5 candles are green, showing a clear upward trend. The core principle of trend trading is <strong>"the trend is your friend"</strong> — going long with the trend has a higher probability of success than fighting it.'
  };
  if (bullCount <= 1) return {
    name: 'Strong Downtrend', signal: 'bear',
    emoji: '📊',
    explanation: '4 or more of the last 5 candles are red, showing a clear downward trend. <strong>Don\'t try to catch a falling knife</strong> — trading with the trend by going short has a much higher win rate than trying to call the bottom.'
  };

  // Generic
  const actualWentUp = candles[CANDLES_SHOW + CANDLES_REVEAL - 1].c > candles[CANDLES_SHOW - 1].c;
  return actualWentUp ? {
    name: 'Slight Bullish Bias', signal: 'bull',
    emoji: '⚖️',
    explanation: 'The market looks mixed, but subtle clues like <strong>candles closing near their highs and short lower wicks</strong> suggest buyers have a slight edge. In choppy markets, these small details can tip the probability in one direction.'
  } : {
    name: 'Slight Bearish Bias', signal: 'bear',
    emoji: '⚖️',
    explanation: 'The market looks mixed, but subtle clues like <strong>candles closing near their lows and long upper wicks</strong> suggest sellers have a slight edge. In choppy markets, these small details can tip the probability in one direction.'
  };
}

function showEduPanel(pattern) {
  const titleEl = document.getElementById('eduTitle');
  const bodyEl = document.getElementById('eduBody');
  const isBull = pattern.signal === 'bull';
  titleEl.innerHTML = `${pattern.emoji} ${pattern.name} <span class="tag ${isBull ? 'tag-bull' : 'tag-bear'}">${isBull ? 'Bullish ↑' : 'Bearish ↓'}</span>`;
  bodyEl.innerHTML = pattern.explanation;
  document.getElementById('eduPanel').classList.add('show');
}

function dismissEdu() {
  document.getElementById('eduPanel').classList.remove('show');
  round++;
  if (round >= TOTAL_ROUNDS) {
    endGame();
  } else {
    nextRound();
  }
}

// ── Guess ──
function guess(dir) {
  if (animating) return;
  animating = true;
  disableButtons(true);

  const beforePrice = allCandles[CANDLES_SHOW - 1].c;
  const afterPrice = allCandles[CANDLES_SHOW + CANDLES_REVEAL - 1].c;
  const wentUp = afterPrice > beforePrice;
  const correct = (dir === 'up' && wentUp) || (dir === 'down' && !wentUp);

  // Animate reveal
  let step = 0;
  const interval = setInterval(() => {
    revealIndex = CANDLES_SHOW + step + 1;
    draw();
    step++;
    if (step >= CANDLES_REVEAL) {
      clearInterval(interval);
      showResult(correct);
    }
  }, 200);
}

function showResult(correct) {
  if (correct) {
    streak++;
    correctCount++;
    const multi = Math.min(streak, 5);
    const pts = BASE_POINTS * multi;
    score += pts;
    roundHistory.push('hit');
  } else {
    streak = 0;
    roundHistory.push('miss');
  }
  maxStreak = Math.max(maxStreak, streak);

  // Update UI
  document.getElementById('score').textContent = score;
  updateStreakDots();

  // Flash result
  const el = document.getElementById('resultText');
  el.textContent = correct ? '+' + (BASE_POINTS * Math.min(correct ? streak : 0, 5)) || '+10' : 'MISS';
  if (correct) {
    const multi = Math.min(streak, 5);
    el.textContent = '+' + (BASE_POINTS * multi);
  }
  el.className = 'result-overlay show ' + (correct ? 'correct' : 'wrong');

  setTimeout(() => {
    el.className = 'result-overlay';
    if (correct) {
      round++;
      if (round >= TOTAL_ROUNDS) {
        endGame();
      } else {
        nextRound();
      }
    } else {
      // Show educational panel; round advance happens in dismissEdu()
      const pattern = detectPattern(allCandles);
      showEduPanel(pattern);
    }
  }, 1200);
}

function nextRound() {
  document.getElementById('round').textContent = round + 1;
  allCandles = genCandles(CANDLES_SHOW + CANDLES_REVEAL);
  revealIndex = CANDLES_SHOW;
  draw();
  animating = false;
  disableButtons(false);
}

function endGame() {
  animating = false;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalDetail').textContent =
    correctCount + '/' + TOTAL_ROUNDS + ' correct  |  Best streak: ' + maxStreak;

  // Show Claim Points button if token is available
  const claimBtn = document.getElementById('claimBtn');
  if (GAME_TOKEN && BOT_NAME) {
    claimBtn.style.display = 'block';
  } else {
    claimBtn.style.display = 'none';
  }

  document.getElementById('gameover').classList.add('show');
}

function disableButtons(disabled) {
  document.getElementById('btnUp').disabled = disabled;
  document.getElementById('btnDown').disabled = disabled;
}

function updateStreakDots() {
  const container = document.getElementById('streakDots');
  container.innerHTML = '';
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const dot = document.createElement('div');
    dot.className = 'streak-dot';
    if (i < roundHistory.length) {
      dot.classList.add(roundHistory[i]);
    }
    container.appendChild(dot);
  }
  const multi = Math.min(streak, 5);
  document.getElementById('streakMulti').textContent =
    streak > 1 ? 'x' + multi + ' combo!' : '';
}

// ── Claim Points ──
function claimPoints() {
  const url = `https://t.me/${BOT_NAME}?start=gs_${GAME_TOKEN}_${score}`;
  // Try Telegram WebApp first, fallback to location
  if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.openTelegramLink) {
    window.Telegram.WebApp.openTelegramLink(url);
  } else {
    window.location.href = url;
  }
}

// ── Start ──
function startGame() {
  score = 0;
  round = 0;
  streak = 0;
  maxStreak = 0;
  correctCount = 0;
  roundHistory = [];
  document.getElementById('score').textContent = '0';
  document.getElementById('round').textContent = '1';
  document.getElementById('gameover').classList.remove('show');
  document.getElementById('eduPanel').classList.remove('show');
  updateStreakDots();
  allCandles = genCandles(CANDLES_SHOW + CANDLES_REVEAL);
  revealIndex = CANDLES_SHOW;
  resize();
  disableButtons(false);
  animating = false;
}

startGame();
</script>
</body>
</html>
